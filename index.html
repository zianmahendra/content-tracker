
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:var(--font-sans)}
.app{display:flex;height:600px;border:0.5px solid var(--color-border-tertiary);border-radius:var(--border-radius-lg);overflow:hidden;background:var(--color-background-primary)}
.sidebar{width:180px;border-right:0.5px solid var(--color-border-tertiary);padding:1rem 0;display:flex;flex-direction:column;gap:4px;background:var(--color-background-secondary);flex-shrink:0}
.sidebar-title{font-size:13px;font-weight:500;color:var(--color-text-secondary);padding:0 1rem 0.5rem;letter-spacing:.03em}
.nav-item{display:flex;align-items:center;gap:8px;padding:8px 1rem;font-size:14px;color:var(--color-text-secondary);cursor:pointer;border-radius:0;transition:background .15s}
.nav-item:hover{background:var(--color-background-primary);color:var(--color-text-primary)}
.nav-item.active{background:var(--color-background-primary);color:var(--color-text-primary);font-weight:500}
.nav-item i{font-size:16px}
.main{flex:1;display:flex;flex-direction:column;overflow:hidden}
.topbar{padding:1rem 1.25rem;border-bottom:0.5px solid var(--color-border-tertiary);display:flex;align-items:center;gap:10px;flex-wrap:wrap}
.topbar-title{font-size:16px;font-weight:500;color:var(--color-text-primary);margin-right:auto}
select,input{font-size:13px;padding:5px 8px;border:0.5px solid var(--color-border-secondary);border-radius:var(--border-radius-md);background:var(--color-background-primary);color:var(--color-text-primary);height:32px}
.btn{font-size:13px;padding:5px 12px;border:0.5px solid var(--color-border-secondary);border-radius:var(--border-radius-md);background:var(--color-background-primary);color:var(--color-text-primary);cursor:pointer;display:inline-flex;align-items:center;gap:6px;height:32px;transition:background .15s}
.btn:hover{background:var(--color-background-secondary)}
.btn.primary{background:#178A63;color:#fff;border-color:#178A63}
.btn.primary:hover{background:#0F6E56}
.content-area{flex:1;overflow-y:auto;padding:1.25rem}
.view-toggle{display:flex;border:0.5px solid var(--color-border-secondary);border-radius:var(--border-radius-md);overflow:hidden}
.vtbtn{padding:4px 12px;font-size:13px;cursor:pointer;border:none;background:transparent;color:var(--color-text-secondary)}
.vtbtn.active{background:var(--color-background-secondary);color:var(--color-text-primary);font-weight:500}
table{width:100%;border-collapse:collapse;font-size:13px}
th{text-align:left;padding:8px 10px;color:var(--color-text-secondary);font-weight:500;border-bottom:0.5px solid var(--color-border-tertiary);font-size:12px}
td{padding:9px 10px;border-bottom:0.5px solid var(--color-border-tertiary);color:var(--color-text-primary);vertical-align:middle}
tr:hover td{background:var(--color-background-secondary)}
.badge{display:inline-block;padding:2px 8px;border-radius:20px;font-size:11px;font-weight:500;white-space:nowrap}
.p-edukasi{background:#EEEDFE;color:#3C3489}
.p-social{background:#E1F5EE;color:#085041}
.p-product{background:#FAECE7;color:#712B13}
.p-hiburan{background:#FAEEDA;color:#633806}
.s-idea{background:#F1EFE8;color:#5F5E5A}
.s-progress{background:#E6F1FB;color:#0C447C}
.s-ready{background:#FAEEDA;color:#633806}
.s-posted{background:#EAF3DE;color:#3B6D11}
.pl-ig{background:#FBEAF0;color:#72243E}
.pl-tt{background:#E6F1FB;color:#185FA5}
.pl-yt{background:#FCEBEB;color:#791F1F}
.kanban{display:grid;grid-template-columns:repeat(4,minmax(0,1fr));gap:12px}
.kancol{background:var(--color-background-secondary);border-radius:var(--border-radius-md);padding:10px}
.kancol-title{font-size:12px;font-weight:500;color:var(--color-text-secondary);margin-bottom:8px;display:flex;align-items:center;justify-content:space-between}
.kancard{background:var(--color-background-primary);border:0.5px solid var(--color-border-tertiary);border-radius:var(--border-radius-md);padding:10px;margin-bottom:8px}
.kancard-title{font-size:13px;font-weight:500;color:var(--color-text-primary);margin-bottom:6px;line-height:1.4}
.kancard-meta{display:flex;gap:4px;flex-wrap:wrap}
.cal-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:2px}
.cal-day-name{text-align:center;font-size:11px;color:var(--color-text-secondary);padding:4px;font-weight:500}
.cal-cell{min-height:64px;border:0.5px solid var(--color-border-tertiary);border-radius:4px;padding:4px;background:var(--color-background-primary)}
.cal-cell.other-month{background:var(--color-background-secondary);opacity:.5}
.cal-date{font-size:11px;color:var(--color-text-secondary);margin-bottom:2px}
.cal-event{font-size:10px;padding:1px 4px;border-radius:3px;margin-bottom:2px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;cursor:pointer}
.modal-bg{position:absolute;inset:0;background:rgba(0,0,0,.35);display:flex;align-items:center;justify-content:center;z-index:10}
.modal{background:var(--color-background-primary);border-radius:var(--border-radius-lg);border:0.5px solid var(--color-border-secondary);padding:1.5rem;width:440px;max-height:90%;overflow-y:auto}
.modal h2{font-size:16px;font-weight:500;margin-bottom:1rem}
.form-group{margin-bottom:12px}
.form-group label{display:block;font-size:12px;color:var(--color-text-secondary);margin-bottom:4px;font-weight:500}
.form-group input,.form-group select,.form-group textarea{width:100%;font-size:13px}
.form-group textarea{height:60px;padding:6px 8px;resize:vertical}
.form-row{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.avatar{width:26px;height:26px;border-radius:50%;display:inline-flex;align-items:center;justify-content:center;font-size:10px;font-weight:500;background:#EEEDFE;color:#3C3489}
.pill-count{background:var(--color-background-secondary);border-radius:20px;font-size:11px;padding:1px 6px;color:var(--color-text-secondary)}
.empty{text-align:center;padding:2rem;color:var(--color-text-secondary);font-size:14px}
</style>

<h2 class="sr-only">Content tracker untuk tim marketing — kelola konten bulanan berdasarkan pilar, platform, dan status</h2>

<div class="app" id="app">
<div class="sidebar">
  <div class="sidebar-title">Content Tracker</div>
  <div class="nav-item active" onclick="setNav('list',this)"><i class="ti ti-layout-list" aria-hidden="true"></i> Content List</div>
  <div class="nav-item" onclick="setNav('calendar',this)"><i class="ti ti-calendar" aria-hidden="true"></i> Kalender</div>
  <div class="nav-item" onclick="setNav('team',this)"><i class="ti ti-users" aria-hidden="true"></i> Tim</div>
  <div style="margin-top:auto;padding:1rem">
    <div style="font-size:11px;color:var(--color-text-secondary);margin-bottom:6px">Total konten</div>
    <div style="font-size:22px;font-weight:500;color:var(--color-text-primary)" id="total-count">0</div>
  </div>
</div>
<div class="main">
  <div id="view-list" class="view-section">
    <div class="topbar">
      <span class="topbar-title">Content List</span>
      <select id="f-bulan" onchange="renderList()"><option value="">Semua bulan</option><option value="2025-05">Mei 2025</option><option value="2025-06" selected>Juni 2025</option><option value="2025-07">Juli 2025</option></select>
      <select id="f-pilar" onchange="renderList()"><option value="">Semua pilar</option><option>Edukasi</option><option>Social Proof</option><option>Product Feature</option><option>Hiburan</option></select>
      <select id="f-platform" onchange="renderList()"><option value="">Semua platform</option><option>Instagram</option><option>TikTok</option><option>YouTube</option></select>
      <select id="f-status" onchange="renderList()"><option value="">Semua status</option><option>Idea</option><option>In Progress</option><option>Ready to Post</option><option>Posted</option></select>
      <div class="view-toggle">
        <button class="vtbtn active" onclick="setView('table',this)"><i class="ti ti-table" aria-hidden="true"></i></button>
        <button class="vtbtn" onclick="setView('kanban',this)"><i class="ti ti-layout-columns" aria-hidden="true"></i></button>
      </div>
      <button class="btn primary" onclick="openModal()"><i class="ti ti-plus" aria-hidden="true"></i> Tambah</button>
    </div>
    <div class="content-area" id="list-body"></div>
  </div>
  <div id="view-calendar" class="view-section" style="display:none">
    <div class="topbar">
      <button class="btn" onclick="calPrev()"><i class="ti ti-chevron-left" aria-hidden="true"></i></button>
      <span class="topbar-title" id="cal-label"></span>
      <button class="btn" onclick="calNext()"><i class="ti ti-chevron-right" aria-hidden="true"></i></button>
    </div>
    <div class="content-area"><div class="cal-grid" id="cal-grid"></div></div>
  </div>
  <div id="view-team" class="view-section" style="display:none">
    <div class="topbar"><span class="topbar-title">Anggota Tim</span><button class="btn primary" onclick="addMember()"><i class="ti ti-plus" aria-hidden="true"></i> Tambah</button></div>
    <div class="content-area" id="team-body"></div>
  </div>
</div>
<div id="modal" style="display:none;position:absolute;inset:0">
  <div class="modal-bg" onclick="closeModal(event)">
    <div class="modal" onclick="event.stopPropagation()">
      <h2 id="modal-title">Tambah Konten</h2>
      <div class="form-group"><label>Judul konten</label><input type="text" id="f-title" placeholder="Judul..."></div>
      <div class="form-row">
        <div class="form-group"><label>Pilar</label><select id="f-cp"><option>Edukasi</option><option>Social Proof</option><option>Product Feature</option><option>Hiburan</option></select></div>
        <div class="form-group"><label>Platform</label><select id="f-plat"><option>Instagram</option><option>TikTok</option><option>YouTube</option></select></div>
      </div>
      <div class="form-row">
        <div class="form-group"><label>Format</label><select id="f-fmt"><option>Reels</option><option>Carousel</option><option>Story</option><option>Static Post</option><option>Short</option></select></div>
        <div class="form-group"><label>Status</label><select id="f-st"><option>Idea</option><option>In Progress</option><option>Ready to Post</option><option>Posted</option></select></div>
      </div>
      <div class="form-row">
        <div class="form-group"><label>Assign ke</label><select id="f-assign"></select></div>
        <div class="form-group"><label>Due date</label><input type="date" id="f-due"></div>
      </div>
      <div class="form-group"><label>Catatan</label><textarea id="f-notes" placeholder="Catatan tambahan..."></textarea></div>
      <div style="display:flex;gap:8px;justify-content:flex-end;margin-top:1rem">
        <button class="btn" onclick="closeModal()">Batal</button>
        <button class="btn primary" onclick="saveContent()">Simpan</button>
      </div>
    </div>
  </div>
</div>
</div>

<script>
let contents=[
  {id:1,title:"Cara pilih jaket anak yang tepat",pilar:"Edukasi",platform:"Instagram",format:"Carousel",status:"Posted",assign:"Zian",due:"2025-06-03",notes:""},
  {id:2,title:"Review dari mama Siti — anaknya betah pakai Wookay",pilar:"Social Proof",platform:"TikTok",format:"Reels",status:"Posted",assign:"Rina",due:"2025-06-05",notes:""},
  {id:3,title:"Fitur waterproof jacket kids",pilar:"Product Feature",platform:"Instagram",format:"Reels",status:"Ready to Post",assign:"Zian",due:"2025-06-10",notes:"Fokus di demo hujan"},
  {id:4,title:"OOTD anak lucu pakai Wookay",pilar:"Hiburan",platform:"TikTok",format:"Reels",status:"In Progress",assign:"Dito",due:"2025-06-12",notes:""},
  {id:5,title:"Tips baju outdoor anak aman & nyaman",pilar:"Edukasi",platform:"YouTube",format:"Short",status:"In Progress",assign:"Rina",due:"2025-06-18",notes:""},
  {id:6,title:"Testimoni 100+ mama puas",pilar:"Social Proof",platform:"Instagram",format:"Carousel",status:"Idea",assign:"Dito",due:"2025-06-22",notes:"Kumpulkan UGC dulu"},
  {id:7,title:"Behind the scenes produksi jaket",pilar:"Product Feature",platform:"TikTok",format:"Reels",status:"Idea",assign:"Zian",due:"2025-06-28",notes:""}
];
let members=["Zian","Rina","Dito"];
let nextId=8;
let currentView="table";
let editId=null;
let calYear=2025,calMonth=5;

const pilarClass={Edukasi:"p-edukasi","Social Proof":"p-social","Product Feature":"p-product","Hiburan":"p-hiburan"};
const statusClass={"Idea":"s-idea","In Progress":"s-progress","Ready to Post":"s-ready","Posted":"s-posted"};
const platClass={Instagram:"pl-ig",TikTok:"pl-tt",YouTube:"pl-yt"};
const pilarColor={Edukasi:"#AFA9EC","Social Proof":"#5DCAA5","Product Feature":"#F0997B","Hiburan":"#FAC775"};

function setNav(name,el){
  document.querySelectorAll('.nav-item').forEach(e=>e.classList.remove('active'));
  el.classList.add('active');
  document.querySelectorAll('.view-section').forEach(e=>e.style.display='none');
  document.getElementById('view-'+name).style.display='flex';
  document.getElementById('view-'+name).style.flexDirection='column';
  if(name==='list')renderList();
  if(name==='calendar')renderCal();
  if(name==='team')renderTeam();
}

function setView(v,el){
  currentView=v;
  document.querySelectorAll('.vtbtn').forEach(e=>e.classList.remove('active'));
  el.classList.add('active');
  renderList();
}

function filtered(){
  let d=[...contents];
  const bulan=document.getElementById('f-bulan').value;
  const pilar=document.getElementById('f-pilar').value;
  const platform=document.getElementById('f-platform').value;
  const status=document.getElementById('f-status').value;
  if(bulan)d=d.filter(x=>x.due&&x.due.startsWith(bulan));
  if(pilar)d=d.filter(x=>x.pilar===pilar);
  if(platform)d=d.filter(x=>x.platform===platform);
  if(status)d=d.filter(x=>x.status===status);
  return d;
}

function renderList(){
  document.getElementById('total-count').textContent=contents.length;
  const data=filtered();
  const el=document.getElementById('list-body');
  if(currentView==='table'){
    if(!data.length){el.innerHTML='<div class="empty"><i class="ti ti-inbox" style="font-size:32px;display:block;margin-bottom:8px" aria-hidden="true"></i>Belum ada konten</div>';return}
    el.innerHTML=`<table><thead><tr><th>Judul</th><th>Pilar</th><th>Platform</th><th>Format</th><th>Assign</th><th>Due</th><th>Status</th><th></th></tr></thead><tbody>`+
    data.map(c=>`<tr>
      <td style="max-width:160px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis" title="${c.title}">${c.title}</td>
      <td><span class="badge ${pilarClass[c.pilar]||''}">${c.pilar}</span></td>
      <td><span class="badge ${platClass[c.platform]||''}">${c.platform}</span></td>
      <td style="color:var(--color-text-secondary)">${c.format}</td>
      <td><span class="avatar" title="${c.assign}">${c.assign.slice(0,2).toUpperCase()}</span></td>
      <td style="color:var(--color-text-secondary);white-space:nowrap">${c.due||'-'}</td>
      <td><span class="badge ${statusClass[c.status]||''}">${c.status}</span></td>
      <td style="white-space:nowrap"><button class="btn" style="padding:3px 8px;height:28px" onclick="editContent(${c.id})"><i class="ti ti-edit" aria-hidden="true"></i></button> <button class="btn" style="padding:3px 8px;height:28px;color:#A32D2D" onclick="deleteContent(${c.id})"><i class="ti ti-trash" aria-hidden="true"></i></button></td>
    </tr>`).join('')+'</tbody></table>';
  } else {
    const cols=["Idea","In Progress","Ready to Post","Posted"];
    el.innerHTML=`<div class="kanban">`+cols.map(s=>{
      const items=data.filter(x=>x.status===s);
      return `<div class="kancol"><div class="kancol-title"><span>${s}</span><span class="pill-count">${items.length}</span></div>`+
      (items.length?items.map(c=>`<div class="kancard">
        <div class="kancard-title">${c.title}</div>
        <div class="kancard-meta">
          <span class="badge ${pilarClass[c.pilar]||''}">${c.pilar}</span>
          <span class="badge ${platClass[c.platform]||''}">${c.platform}</span>
        </div>
        <div style="margin-top:6px;display:flex;align-items:center;justify-content:space-between">
          <span style="font-size:11px;color:var(--color-text-secondary)">${c.due||''}</span>
          <span class="avatar" title="${c.assign}">${c.assign.slice(0,2).toUpperCase()}</span>
        </div>
      </div>`).join(''):'<div style="font-size:12px;color:var(--color-text-secondary);text-align:center;padding:12px">Kosong</div>')+
      `</div>`;
    }).join('')+'</div>';
  }
}

function renderCal(){
  const months=["Januari","Februari","Maret","April","Mei","Juni","Juli","Agustus","September","Oktober","November","Desember"];
  document.getElementById('cal-label').textContent=`${months[calMonth]} ${calYear}`;
  const firstDay=new Date(calYear,calMonth,1).getDay();
  const daysInMonth=new Date(calYear,calMonth+1,0).getDate();
  const dayNames=["Min","Sen","Sel","Rab","Kam","Jum","Sab"];
  let html=dayNames.map(d=>`<div class="cal-day-name">${d}</div>`).join('');
  for(let i=0;i<firstDay;i++)html+=`<div class="cal-cell other-month"></div>`;
  for(let d=1;d<=daysInMonth;d++){
    const dateStr=`${calYear}-${String(calMonth+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
    const items=contents.filter(c=>c.due===dateStr);
    html+=`<div class="cal-cell"><div class="cal-date">${d}</div>`+
    items.map(c=>`<div class="cal-event" style="background:${pilarColor[c.pilar]||'#ccc'};color:#3C3234" title="${c.title} — ${c.assign}">${c.title}</div>`).join('')+
    `</div>`;
  }
  document.getElementById('cal-grid').innerHTML=html;
}

function calPrev(){if(calMonth===0){calMonth=11;calYear--;}else calMonth--;renderCal()}
function calNext(){if(calMonth===11){calMonth=0;calYear++;}else calMonth++;renderCal()}

function renderTeam(){
  const el=document.getElementById('team-body');
  const colors=["#EEEDFE","#E1F5EE","#FAECE7","#FAEEDA","#E6F1FB"];
  const tcolors=["#3C3489","#085041","#712B13","#633806","#0C447C"];
  el.innerHTML=members.map((m,i)=>{
    const count=contents.filter(c=>c.assign===m).length;
    return `<div style="display:flex;align-items:center;gap:12px;padding:12px;border:0.5px solid var(--color-border-tertiary);border-radius:var(--border-radius-md);margin-bottom:8px;background:var(--color-background-primary)">
      <div style="width:40px;height:40px;border-radius:50%;background:${colors[i%5]};color:${tcolors[i%5]};display:flex;align-items:center;justify-content:center;font-size:14px;font-weight:500">${m.slice(0,2).toUpperCase()}</div>
      <div style="flex:1"><div style="font-size:14px;font-weight:500">${m}</div><div style="font-size:12px;color:var(--color-text-secondary)">${count} konten ditugaskan</div></div>
      <button class="btn" style="color:#A32D2D;padding:4px 8px" onclick="deleteMember('${m}')"><i class="ti ti-trash" aria-hidden="true"></i></button>
    </div>`;
  }).join('');
}

function addMember(){
  const name=prompt("Nama anggota tim:");
  if(name&&name.trim()&&!members.includes(name.trim())){members.push(name.trim());renderTeam();}
}
function deleteMember(m){
  if(confirm(`Hapus ${m} dari tim?`)){members=members.filter(x=>x!==m);renderTeam();}
}

function openModal(id=null){
  editId=id;
  document.getElementById('modal-title').textContent=id?'Edit Konten':'Tambah Konten';
  const sel=document.getElementById('f-assign');
  sel.innerHTML=members.map(m=>`<option>${m}</option>`).join('');
  if(id){
    const c=contents.find(x=>x.id===id);
    document.getElementById('f-title').value=c.title;
    document.getElementById('f-cp').value=c.pilar;
    document.getElementById('f-plat').value=c.platform;
    document.getElementById('f-fmt').value=c.format;
    document.getElementById('f-st').value=c.status;
    document.getElementById('f-assign').value=c.assign;
    document.getElementById('f-due').value=c.due;
    document.getElementById('f-notes').value=c.notes;
  } else {
    document.getElementById('f-title').value='';
    document.getElementById('f-due').value='';
    document.getElementById('f-notes').value='';
  }
  document.getElementById('modal').style.display='block';
}

function closeModal(e){
  if(!e||e.target.classList.contains('modal-bg'))document.getElementById('modal').style.display='none';
}

function saveContent(){
  const title=document.getElementById('f-title').value.trim();
  if(!title)return alert("Judul tidak boleh kosong");
  const obj={
    id:editId||nextId++,
    title,
    pilar:document.getElementById('f-cp').value,
    platform:document.getElementById('f-plat').value,
    format:document.getElementById('f-fmt').value,
    status:document.getElementById('f-st').value,
    assign:document.getElementById('f-assign').value,
    due:document.getElementById('f-due').value,
    notes:document.getElementById('f-notes').value
  };
  if(editId){contents=contents.map(c=>c.id===editId?obj:c);}
  else contents.push(obj);
  closeModal();
  renderList();
}

function editContent(id){openModal(id)}
function deleteContent(id){if(confirm("Hapus konten ini?"))contents=contents.filter(x=>x.id!==id);renderList();}

renderList();
document.getElementById('view-list').style.display='flex';
document.getElementById('view-list').style.flexDirection='column';
</script>
